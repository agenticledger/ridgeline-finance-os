<svg width="220" height="44" viewBox="0 0 220 44" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon - white/light version (no dark tile background) -->
  <g transform="translate(0, 3)">
    <!-- Cyan O ring -->
    <circle cx="19" cy="18" r="10" fill="none" stroke="#22d3ee" stroke-width="1.8"/>
    <!-- Center dot -->
    <circle cx="19" cy="18" r="3.5" fill="#22d3ee"/>
    <!-- Top tick -->
    <line x1="19" y1="5" x2="19" y2="11" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Accent dot -->
    <circle cx="30" cy="8" r="3" fill="#22d3ee" opacity="0.35"/>
    <circle cx="30" cy="8" r="1.5" fill="#22d3ee"/>
  </g>
  <!-- Wordmark -->
  <text x="46" y="22" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="400" fill="currentColor" letter-spacing="-0.5">Orphil</text>
  <text x="47" y="35" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="8.5" font-weight="500" fill="#22d3ee" letter-spacing="0.22em">ADVISORY</text>
</svg>
